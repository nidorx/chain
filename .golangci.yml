version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - bodyclose
    - noctx
    - prealloc
    - unparam

linter-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false
  govet:
    enable-all: true
    disable:
      - fieldalignment
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/nidorx/chain
  misspell:
    locale: US

issues:
  exclude:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - errcheck
        - govet
        - unparam
        - noctx
        - bodyclose

    # Exclude deprecated functions (MD5) from unused check
    - path: utils\.go
      linters:
        - staticcheck
      text: "SA1019"

    # Allow fmt.Printf in examples
    - path: examples/
      linters:
        - noctx
        - bodyclose

  max-issues-per-linter: 50
  max-same-issues: 10

severity:
  default: error